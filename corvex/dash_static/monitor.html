<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Corvex — Run Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0c12; --bg2:#11151e; --bg3:#181d29; --line:rgba(180,200,255,.09);
  --text:#e7ebf4; --muted:#8b93a7; --dim:#5c6478; --dimmer:#3e4556;
  --ok:#8eb0ff; --warn:#d4924a; --bad:#e85d6a; --accent:#7aa2ff; --blue:#7aa2ff;
  --copper:#c4783a; --ink:#0d111a;
  --font:"Outfit",system-ui,sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
}
* { box-sizing:border-box; }
html,body { margin:0; min-height:100%; background:var(--bg); color:var(--text);
  font-family:var(--font); -webkit-font-smoothing:antialiased; }
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 42% at 0% -8%, rgba(122,162,255,.16), transparent 55%),
    radial-gradient(ellipse 45% 35% at 100% 8%, rgba(212,146,74,.08), transparent 50%),
    linear-gradient(180deg,#0d1018 0%, var(--bg) 38%);
}
.page { position:relative; z-index:1; max-width:1280px; margin:0 auto; padding:14px 16px 40px; }
.nav {
  display:flex; justify-content:space-between; align-items:center; gap:12px;
  padding:10px 2px 14px; border-bottom:1px solid var(--line);
}
.brand { display:flex; align-items:center; gap:10px; }
.mark {
  width:30px; height:30px; border-radius:8px; display:grid; place-items:center;
  background:linear-gradient(145deg,#1a2438,#0e1420); border:1px solid var(--line);
}
.mark svg { width:15px; height:15px; }
.brand h1 { margin:0; font-size:1.05rem; font-weight:700; letter-spacing:-.03em; }
.brand h1 span { color:var(--dim); font-weight:500; font-size:.78rem; margin-left:6px; }
.nav-meta { font-family:var(--mono); font-size:.68rem; color:var(--dim); text-align:right; line-height:1.5; }
.pulse { display:inline-flex; align-items:center; gap:6px; color:var(--muted); }
.pulse i { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:ping 2.2s ease infinite; }
.pulse.idle i { background:var(--dim); animation:none; }
.toolbar { display:grid; grid-template-columns:1.4fr 1fr; gap:12px; margin-top:14px; }
.hero, .kpis {
  background:rgba(17,21,30,.94); border:1px solid var(--line); border-radius:12px; padding:16px 18px;
}
.hero .label { font-family:var(--mono); font-size:.66rem; letter-spacing:.1em; color:var(--dim); text-transform:uppercase; }
.hero .status { font-size:clamp(1.8rem,4vw,2.6rem); font-weight:800; letter-spacing:-.04em; margin-top:6px; line-height:1; }
.hero .status.ok { color:var(--ok); } .hero .status.warn { color:var(--warn); }
.hero .status.bad { color:var(--bad); } .hero .status.dim { color:var(--muted); }
.hero .detail { margin-top:8px; color:var(--muted); font-size:.9rem; line-height:1.4; }
.hero .meta { margin-top:10px; font-family:var(--mono); font-size:.7rem; color:var(--dim); word-break:break-all; }
.kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; align-content:center; }
.kpi .n { font-family:var(--mono); font-size:1.35rem; font-weight:600; letter-spacing:-.03em; }
.kpi .l { font-size:.66rem; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; margin-top:4px; }
.frame {
  margin-top:14px; border:1px solid var(--line); border-radius:14px; overflow:hidden;
  background:rgba(13,17,26,.96); box-shadow:0 24px 60px rgba(0,0,0,.4);
}
.frame-edge { height:3px; background:linear-gradient(90deg,var(--accent),var(--copper),transparent); opacity:.7; }
.body { display:grid; grid-template-columns:1fr 280px; min-height:520px; }
.main { border-right:1px solid var(--line); display:flex; flex-direction:column; min-width:0; }
.tabs {
  display:flex; gap:2px; padding:8px 10px; border-bottom:1px solid var(--line);
  background:var(--bg2); flex-wrap:wrap; align-items:center;
}
.tab {
  font-family:var(--mono); font-size:.72rem; padding:7px 12px; border-radius:8px;
  border:1px solid transparent; background:transparent; color:var(--muted); cursor:pointer;
}
.tab:hover { color:var(--text); background:rgba(255,255,255,.03); }
.tab.on { color:var(--accent); border-color:rgba(122,162,255,.35); background:rgba(122,162,255,.1); }
.tab .badge {
  margin-left:6px; font-size:.64rem; padding:1px 6px; border-radius:999px;
  background:rgba(212,146,74,.15); color:var(--warn); border:1px solid rgba(212,146,74,.3);
}
.scroll { flex:1; overflow:auto; max-height:min(68vh,720px); }
.log {
  display:flex; gap:10px; padding:7px 14px; border-bottom:1px solid rgba(255,255,255,.025);
  align-items:flex-start; font-family:var(--mono); animation:slide .18s ease-out;
}
.log:hover { background:rgba(255,255,255,.015); }
.log .t { font-size:.68rem; color:var(--dimmer); flex-shrink:0; padding-top:2px; min-width:64px; }
.log .lvl {
  font-size:.62rem; font-weight:700; padding:2px 6px; border-radius:4px; flex-shrink:0;
  letter-spacing:.06em; min-width:52px; text-align:center; border:1px solid;
}
.log .lvl.INFO { color:var(--blue); background:rgba(88,166,255,.12); border-color:rgba(88,166,255,.28); }
.log .lvl.WARNING { color:var(--warn); background:rgba(230,184,77,.12); border-color:rgba(230,184,77,.28); }
.log .lvl.ERROR { color:var(--bad); background:rgba(255,107,122,.12); border-color:rgba(255,107,122,.28); }
.log .kind { font-size:.62rem; color:var(--accent); flex-shrink:0; min-width:48px; }
.log .host { font-size:.68rem; color:var(--dim); flex-shrink:0; min-width:70px; }
.log .line { font-size:.78rem; color:#d3dbd6; word-break:break-all; flex:1; min-width:0; }
.card {
  margin:10px 12px; padding:14px 14px 12px; border-radius:10px;
  border:1px solid var(--line); background:var(--bg2);
}
.card.active { border-color:rgba(122,162,255,.3); }
.card.warn { border-color:rgba(212,146,74,.3); }
.card .top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
.card .id { font-weight:700; font-size:.95rem; letter-spacing:-.02em; }
.card .score { font-family:var(--mono); font-size:.72rem; color:var(--accent);
  padding:3px 8px; border-radius:6px; border:1px solid rgba(110,200,255,.2); background:rgba(110,200,255,.08); }
.stages { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.stage {
  font-family:var(--mono); font-size:.66rem; padding:4px 8px; border-radius:4px;
  border:1px solid var(--line); color:var(--dim);
}
.stage.on { color:var(--accent); border-color:rgba(122,162,255,.35); }
.chip {
  display:inline-block; font-family:var(--mono); font-size:.64rem; padding:2px 8px;
  border-radius:999px; border:1px solid var(--line); color:var(--muted);
}
.chip.ok { color:var(--ok); border-color:rgba(142,176,255,.35); background:rgba(142,176,255,.08); }
.chip.warn { color:var(--warn); border-color:rgba(212,146,74,.35); background:rgba(212,146,74,.08); }
.chip.bad { color:var(--bad); border-color:rgba(232,93,106,.35); background:rgba(232,93,106,.08); }
.meta { color:var(--muted); font-size:.78rem; margin-top:6px; line-height:1.4; }
.refuse {
  margin-top:10px; padding:9px 11px; border-radius:8px; font-size:.75rem; line-height:1.45;
  color:#ecd9a8; background:rgba(230,184,77,.07); border:1px solid rgba(230,184,77,.2);
}
.empty { padding:48px 20px; text-align:center; color:var(--muted); font-size:.92rem; }
.empty code { font-family:var(--mono); font-size:.8em; color:#c8d5e2; }
.rail { padding:12px; background:rgba(8,11,10,.8); }
.rail h3 { margin:0 0 10px; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
.rail .bar {
  display:flex; justify-content:space-between; font-family:var(--mono); font-size:.7rem;
  padding:6px 0; border-bottom:1px solid rgba(255,255,255,.04); color:var(--muted);
}
.rail .bar b { color:var(--text); font-weight:600; }
.strip {
  margin-top:12px; padding:12px 14px; border-radius:10px; border:1px solid var(--line);
  border-left:3px solid var(--copper); background:rgba(17,21,30,.9); display:flex;
  justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center;
}
.strip .t { font-family:var(--mono); font-size:.7rem; letter-spacing:.08em; color:var(--warn); }
.strip .s { font-size:.82rem; color:var(--muted); margin-top:3px; }
.feed-note {
  margin-top:8px; font-family:var(--mono); font-size:.68rem; color:var(--dim); line-height:1.45;
}
.sealed {
  margin-top:14px; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
  background:rgba(14,18,16,.7); color:var(--dim); font-size:.78rem;
}
.sealed summary { cursor:pointer; font-family:var(--mono); font-size:.75rem; color:var(--muted); }
.foot { margin-top:16px; font-size:.72rem; color:var(--dimmer); }
@keyframes ping {
  0% { box-shadow:0 0 0 0 rgba(110,200,255,.45); }
  70% { box-shadow:0 0 0 8px rgba(110,200,255,0); }
  100% { box-shadow:0 0 0 0 rgba(110,200,255,0); }
}
@keyframes slide { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
@media (max-width:900px) {
  .toolbar,.body,.kpis { grid-template-columns:1fr; }
  .main { border-right:none; border-bottom:1px solid var(--line); }
}
</style>
</head>
<body>
<div class="page" id="app">
  <div class="nav">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M3 11.5C5.5 11.5 7 9.2 8.2 6.8C9.1 5 10.2 3.5 12.5 3.2" stroke="#7aa2ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M8.2 6.8C7.2 8.5 6.8 10.2 8 12.2" stroke="#7aa2ff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="12.6" cy="3.2" r="1.15" fill="#d4924a"/>
        </svg>
      </div>
      <h1>Corvex <span>run feed</span></h1>
    </div>
    <div class="nav-meta">
      <div class="pulse" id="pulse"><i></i> <span id="feedMode">file-tail · 2s</span></div>
      <div>v__VER__</div>
      <div id="gen">—</div>
    </div>
  </div>
  <div id="root"></div>
</div>
<script id="boot" type="application/json">__BOOT__</script>
<script>
(function() {
  const LEVEL_TEXT = { INFO:"#d3dbd6", WARNING:"#f0cd7a", ERROR:"#f5a3a3" };
  let tab = "campaigns";
  let snap = JSON.parse(document.getElementById("boot").textContent);

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function clock(ts) {
    if (!ts) return "—";
    try {
      const d = new Date(ts);
      if (isNaN(d)) return esc(String(ts).slice(11,19) || ts);
      return d.toLocaleTimeString("en", { hour12:false, hour:"2-digit", minute:"2-digit", second:"2-digit" });
    } catch(e) { return "—"; }
  }
  function heroClass(st) {
    return ({ CAMPAIGN:"ok", PARTIAL:"warn", REFUSE:"bad", EMPTY:"warn", NO_RUN:"dim" })[st] || "dim";
  }
  function chipClass(st) {
    st = String(st || "");
    if (st === "complete" || st === "CAMPAIGN") return "ok";
    if (st === "partial" || st === "PARTIAL" || st === "locked") return "warn";
    if (st === "insufficient_evidence" || st === "REFUSE") return "bad";
    return "";
  }

  function logRows(rows) {
    if (!rows.length) return '<div class="empty">No activity in this run.<br/><code>corvex replay …</code> or <code>--run-dir</code></div>';
    return rows.map(e => `
      <div class="log">
        <span class="t">${clock(e.ts)}</span>
        <span class="lvl ${esc(e.level)}">${esc(e.level)}</span>
        <span class="kind">${esc(e.kind)}</span>
        <span class="host">${esc(e.host)}</span>
        <span class="line" style="color:${LEVEL_TEXT[e.level]||'#d3dbd6'}">${esc(e.line)}</span>
      </div>`).join("");
  }

  function campaignCards(s) {
    const camps = (s.run && s.run.campaigns) || [];
    const reconMap = s.recon_by_id || {};
    if (!camps.length) {
      return '<div class="empty">No campaigns correlated yet.<br/>Activity tab shows raw attack attempts.</div>';
    }
    return camps.map(c => {
      const cid = c.campaign_id || "campaign";
      const hosts = (c.host_ids || []).join(", ");
      const stages = (c.stages || []).map(st => {
        const name = (st && (st.name || st.stage)) || "?";
        return `<span class="stage on">${esc(name)}</span>`;
      }).join("") || '<span class="stage">—</span>';
      const r = reconMap[cid] || {};
      const st = r.status || (s.run.reconstruction && s.run.reconstruction.aggregate_status) || "—";
      const gaps = (r.gaps || []).join("; ");
      const q = r.quarantine;
      let qhtml = "";
      if (q && typeof q === "object") {
        qhtml = `<div class="meta">Isolate plan: ${esc((q.host_ids||[]).join(", "))} · ${esc(q.mode)} — ${esc(q.honesty||"")}</div>`;
      } else if (Object.keys(r).length) {
        qhtml = `<div class="refuse">No isolate plan — refuse inventing targets</div>`;
      }
      const gapHtml = gaps ? `<div class="refuse">Gaps (expected): ${esc(gaps)}</div>` : "";
      const border = st === "partial" || st === "insufficient_evidence" ? "warn" : "active";
      return `
        <article class="card ${border}">
          <div class="top">
            <div>
              <div class="id">${esc(cid)} <span class="chip ${chipClass(st)}">${esc(st)}</span></div>
              <div class="meta">${esc(hosts)}</div>
            </div>
            <span class="score">${esc(c.score != null ? Number(c.score).toFixed(2) : "—")}</span>
          </div>
          <div class="stages">${stages}</div>
          ${gapHtml}${qhtml}
        </article>`;
    }).join("");
  }

  function quarantinePanel(s) {
    const q = s.quarantine || {};
    const claim = s.claim || {};
    const prev = s.prevention || [];
    const honesty = (q.honesty || []).join(" ");
    let prevHtml = prev.length
      ? prev.map(p => `
          <div class="log">
            <span class="t">${clock(p.ts)}</span>
            <span class="lvl WARNING">${esc(p.status||"log")}</span>
            <span class="kind">${esc(p.attack_type||"atk")}</span>
            <span class="host">${esc((p.hosts||[]).slice(0,3).join(","))}</span>
            <span class="line">${esc(p.summary||p.attack_name||"")}</span>
          </div>`).join("")
      : '<div class="empty">No prevention log entries yet.<br/>Dry-run / lab-flag actions appear here when recorded.</div>';
    return `
      <div class="card active" style="margin-top:12px">
        <div class="top">
          <div>
            <div class="id">Contain mode · ${esc(q.mode||"—")}</div>
            <div class="meta">CORVEX_CONTAIN=${esc(q.corvex_contain)} · live_executor=${esc(!!q.live_executor)}</div>
          </div>
          <span class="chip ${claim.allowed ? "ok" : "warn"}">${claim.allowed ? "claim open" : "claim locked"}</span>
        </div>
        <div class="meta">${esc(q.message||"")}</div>
        <div class="refuse">${esc(honesty || "Live OS quarantine is not implemented.")}</div>
        <div class="meta" style="margin-top:10px">${esc(claim.language||"")}</div>
      </div>
      <div style="padding:4px 0 8px 12px;font-family:var(--mono);font-size:.7rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase">Prevention log</div>
      ${prevHtml}`;
  }

  function rail(s) {
    const k = s.kpis || {};
    const by = k.by_kind || {};
    const kinds = Object.keys(by).sort((a,b)=>by[b]-by[a]);
    const hosts = (s.run && s.run.hosts) || [];
    const kindBars = kinds.length
      ? kinds.map(x => `<div class="bar"><span>${esc(x)}</span><b>${by[x]}</b></div>`).join("")
      : '<div class="bar"><span>no events</span><b>0</b></div>';
    const hostBars = hosts.length
      ? hosts.map(h => `<div class="bar"><span>${esc(h)}</span><b>·</b></div>`).join("")
      : '<div class="bar"><span>—</span><b>0</b></div>';
    return `
      <h3>Signal mix</h3>${kindBars}
      <h3 style="margin-top:18px">Hosts in run</h3>${hostBars}
      <h3 style="margin-top:18px">Honesty</h3>
      <div class="bar"><span>quarantine</span><b>${esc((s.quarantine||{}).mode||"—")}</b></div>
      <div class="bar"><span>live executor</span><b>false</b></div>
      <div class="bar"><span>claim</span><b>${(s.claim||{}).allowed ? "open" : "locked"}</b></div>`;
  }

  function paint(s) {
    snap = s;
    const hero = s.hero || {};
    const k = s.kpis || {};
    const q = s.quarantine || {};
    const run = s.run || {};
    const gen = document.getElementById("gen");
    if (gen) gen.textContent = s.generated_at || "—";

    const camps = run.campaigns || [];
    const activity = s.activity || [];
    const audit = s.audit || [];

    let main = "";
    if (tab === "campaigns") main = campaignCards(s);
    else if (tab === "activity") main = logRows(activity);
    else if (tab === "audit") main = audit.length ? logRows(audit) : '<div class="empty">No correlator audit yet for this run.</div>';
    else if (tab === "quarantine") main = quarantinePanel(s);

    const sealed = s.sealed_eval || {};
    const m = sealed.metrics || {};

    document.getElementById("root").innerHTML = `
      <div class="toolbar">
        <section class="hero">
          <div class="label">This run</div>
          <div class="status ${heroClass(hero.status)}">${esc(hero.status||"—")}</div>
          <div class="detail">${esc(hero.detail||"")}</div>
          <div class="meta">${esc(run.dir||"no run")} · pack ${esc(run.pack||"—")}</div>
        </section>
        <section class="kpis">
          <div class="kpi"><div class="n">${k.events||0}</div><div class="l">Events</div></div>
          <div class="kpi"><div class="n">${k.hosts||0}</div><div class="l">Hosts</div></div>
          <div class="kpi"><div class="n">${k.campaigns||0}</div><div class="l">Campaigns</div></div>
          <div class="kpi"><div class="n">${k.auth||0}</div><div class="l">Auth hops</div></div>
          <div class="kpi"><div class="n">${k.exfil||0}</div><div class="l">Exfil / blob</div></div>
          <div class="kpi"><div class="n">${esc(q.mode||"—")}</div><div class="l">Contain</div></div>
        </section>
      </div>

      <div class="strip">
        <div>
          <div class="t">${esc(hero.status||"STANDBY")} · ${(s.claim||{}).allowed ? "CLAIM OPEN" : "CLAIM LOCKED"}</div>
          <div class="s">${esc(q.message||"Dry-run only — no OS isolate.")}</div>
          <div class="feed-note" id="feedNote"></div>
        </div>
      </div>

      <div class="frame">
        <div class="frame-edge"></div>
        <div class="body">
          <div class="main">
            <div class="tabs">
              <button type="button" class="tab ${tab==="campaigns"?"on":""}" data-tab="campaigns">Campaigns${camps.length?`<span class="badge">${camps.length}</span>`:""}</button>
              <button type="button" class="tab ${tab==="activity"?"on":""}" data-tab="activity">Activity${activity.length?`<span class="badge">${activity.length}</span>`:""}</button>
              <button type="button" class="tab ${tab==="audit"?"on":""}" data-tab="audit">Correlator</button>
              <button type="button" class="tab ${tab==="quarantine"?"on":""}" data-tab="quarantine">Contain</button>
            </div>
            <div class="scroll">${main}</div>
          </div>
          <aside class="rail">${rail(s)}</aside>
        </div>
      </div>

      <details class="sealed">
        <summary>Sealed Day-0 eval (not this run) — gate ${esc(sealed.gate||"—")}</summary>
        <div style="margin-top:10px;font-family:var(--mono);font-size:.75rem;line-height:1.7">
          precision ${m.precision ?? "—"} · recall ${m.recall ?? "—"} ·
          F1 ${m.correlator_f1 ?? "—"} · FCR ${m.false_campaign_rate ?? "—"}
          <div style="color:var(--dim);margin-top:6px">These numbers are sealed lab packs. They do not describe the activity above.</div>
        </div>
      </details>
      <div class="foot">Run feed — tails events.jsonl on --run-dir every 2s (not a bus WebSocket). No toggles. No live isolate button.</div>`;

    const feed = s.feed || {};
    const note = document.getElementById("feedNote");
    if (note) {
      note.textContent = feed.events_path
        ? `Following ${feed.events_path} · ${feed.events_count||0} lines · ${feed.note||""}`
        : (feed.note || "No run loaded — dash cannot see attacks until --run-dir points at a writing run.");
    }
    const pulse = document.getElementById("pulse");
    const feedMode = document.getElementById("feedMode");
    if (feedMode) feedMode.textContent = `file-tail · ${(feed.poll_ms||2000)/1000}s`;
    if (pulse) {
      const grew = (feed.events_count||0) > lastEventCount;
      pulse.classList.toggle("idle", !run.loaded);
      if (grew) pulse.querySelector("i") && (pulse.querySelector("i").style.background = "var(--warn)");
      lastEventCount = feed.events_count || 0;
    }

    document.querySelectorAll("[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => { tab = btn.getAttribute("data-tab"); paint(snap); });
    });
  }

  let lastEventCount = (snap.feed && snap.feed.events_count) || 0;
