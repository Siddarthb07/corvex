name: corvex-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install build
      - name: Detector AST purity
        run: python -m pytest tests/test_day0.py::test_detectors_ast_purity -q
      - name: Refuse default HMAC strings in tree
        run: |
          # auth.py may list poison values; the workflow itself mentions them — ignore both.
          if grep -RIn --exclude-dir=.git --exclude-dir=.venv --exclude-dir=.github \
            --exclude=auth.py \
            -e 'corvex-shared-secret' -e 'test-shared-hmac' . ; then
            echo "Forbidden shared HMAC secret found" >&2
            exit 1
          fi
      - name: Unit + abuse tests
        run: python -m pytest tests -q
      - name: Clean-clone replay smoke
        run: |
          mkdir -p /tmp/corvex-enroll
          export CORVEX_ENROLLMENT=/tmp/corvex-enroll/enrollment.json
          corvex replay train/train-lateral.jsonl --out-dir runs/ci-demo
          test -f runs/ci-demo/timeline.json
          export CORVEX_RUN_DIR="$PWD/runs/ci-demo"
          corvex dash --build --no-open
      - name: No destructive verbs in package
        run: python -c "from corvex.stage_c import find_destructive_verbs_in_package as f; assert f()==[]"
      - name: Drafts not in wheel
        run: |
          python -m build
          python <<'PY'
          import zipfile, pathlib
          wheels = list(pathlib.Path("dist").glob("*.whl"))
          assert wheels, "no wheel"
          names = zipfile.ZipFile(wheels[0]).namelist()
          assert not any(n.startswith("drafts/") for n in names), names
          print("wheel ok", wheels[0])
          PY